<!DOCTYPE html>
<html>

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>24 Hour Timer</title>
        <style>
            body{
                display:flex;
                justify-content:center;
                align-items:center;
                height:100vh;
                background:#e6f2f2;
                font-family:monospace;
            }

            .clock{
                font-size:60px;
                background:#003333;
                color:white;
                padding:30px 60px;
                border-radius:10px;
            }

            /* Minutes */
            .minutes::after{
                content:"00";
                animation: minutes 60s steps(60) infinite;
            }

            @keyframes minutes{
                0%{content:"00";}
                10%{content:"10";}
                20%{content:"20";}
                30%{content:"30";}
                40%{content:"40";}
                50%{content:"50";}
                60%{content:"00";}
            }

            /* Hours */
            .hours::after{
                content:"00";
                animation: hours 1440s steps(24) infinite;
            }

            @keyframes hours{
                0%{content:"00";}
                25%{content:"06";}
                50%{content:"12";}
                75%{content:"18";}
                100%{content:"00";}
            }
        </style>
</head>

<body>
    <div class="clock">
        <span class="hours"></span> :
        <span class="minutes"></span>
    </div>
</body>

</html>
